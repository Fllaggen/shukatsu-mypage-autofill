<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Shukatsu Autofill Test Form</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 32px auto;
      max-width: 720px;
      line-height: 1.6;
    }
    label {
      display: block;
      margin: 12px 0;
    }
    input, select {
      display: block;
      width: 100%;
      max-width: 420px;
      padding: 8px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <h1>新卒マイページ登録テスト</h1>
  <form>
    <label>氏名 <input name="full_name" autocomplete="name"></label>
    <label>氏名カナ <input name="full_name_kana"></label>
    <label>姓 <input name="last_name" autocomplete="family-name"></label>
    <label>名 <input name="first_name" autocomplete="given-name"></label>
    <label>郵便番号 <input name="postal_code" autocomplete="postal-code"></label>
    <label>都道府県
      <select name="prefecture" autocomplete="address-level1">
        <option value="">選択してください</option>
        <option>東京都</option>
        <option>神奈川県</option>
        <option>大阪府</option>
      </select>
    </label>
    <label>住所1 <input name="address1" autocomplete="address-line1"></label>
    <label>住所2 <input name="address2" autocomplete="address-line2"></label>
    <label>携帯電話 <input name="mobile_phone" autocomplete="tel"></label>
    <label>メールアドレス <input name="email" autocomplete="email"></label>
    <label>大学名 <input name="school_name"></label>
    <label>学部 <input name="faculty"></label>
    <label>学科 <input name="department"></label>
    <label>卒業予定年
      <select name="graduation_year">
        <option value="">選択してください</option>
        <option>2026</option>
        <option>2027</option>
        <option>2028</option>
      </select>
    </label>
    <label>卒業予定月
      <select name="graduation_month">
        <option value="">選択してください</option>
        <option>3</option>
        <option>9</option>
      </select>
    </label>
    <button type="button">送信しないテストボタン</button>
  </form>
</body>
</html>
