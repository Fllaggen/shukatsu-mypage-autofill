<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shukatsu Autofill</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <header>
      <div>
        <h1>Shukatsu Autofill</h1>
        <p>企業マイページ登録フォーム用</p>
      </div>
      <label class="switch">
        <input id="overwrite" type="checkbox" checked>
        <span>上書き</span>
      </label>
    </header>

    <main>
      <section class="actions">
        <button id="save" type="button">保存</button>
        <button id="fill" type="button" class="primary">現在ページに入力</button>
        <button id="scan" type="button">入力欄チェック</button>
        <button id="highlight" type="button">入力欄を表示</button>
        <button id="clearHighlight" type="button">表示を消す</button>
        <button id="copyUnknown" type="button">未判定をコピー</button>
        <button id="findEntry" type="button">登録入口を探す</button>
        <button id="exportProfile" type="button">保存データを書き出す</button>
        <button id="importProfile" type="button">保存データを読み込む</button>
        <button id="clearProfile" type="button" class="danger">保存情報を消す</button>
        <input id="importFile" type="file" accept="application/json,.json" hidden>
      </section>

      <section id="status" class="status" aria-live="polite"></section>

      <section id="review" class="panel review" hidden>
        <div class="review-head">
          <h2>入力後レビュー</h2>
          <button id="clearReview" type="button">閉じる</button>
        </div>
        <div id="reviewSummary" class="review-summary"></div>
        <div id="reviewBody"></div>
      </section>

      <section class="panel">
        <h2>名前</h2>
        <div class="grid two">
          <label>姓<input data-key="lastName" autocomplete="family-name"></label>
          <label>名<input data-key="firstName" autocomplete="given-name"></label>
          <label>セイ<input data-key="lastNameKana"></label>
          <label>メイ<input data-key="firstNameKana"></label>
          <label>ローマ字姓<input data-key="romanLastName" placeholder="YAMADA"></label>
          <label>ローマ字名<input data-key="romanFirstName" placeholder="TARO"></label>
        </div>
      </section>

      <section class="panel">
        <h2>連絡先</h2>
        <label>メインメール<input data-key="email" type="email" autocomplete="email"></label>
        <label>サブメール<input data-key="subEmail" type="email"></label>
        <div class="grid two">
          <label>自宅電話<input data-key="homePhone" placeholder="03-1234-5678"></label>
          <label>携帯番号<input data-key="mobilePhone" placeholder="090-1234-5678"></label>
        </div>
      </section>

      <section class="panel">
        <h2>基本情報</h2>
        <div class="grid three">
          <label>生年<input data-key="birthYear" inputmode="numeric" placeholder="2004"></label>
          <label>月<input data-key="birthMonth" inputmode="numeric" placeholder="04"></label>
          <label>日<input data-key="birthDay" inputmode="numeric" placeholder="01"></label>
        </div>
        <label>性別
          <select data-key="gender">
            <option value="">未選択</option>
            <option value="男性">男性</option>
            <option value="女性">女性</option>
            <option value="無回答">無回答</option>
          </select>
        </label>
      </section>

      <section class="panel">
        <h2>住所</h2>
        <div class="grid two">
          <label>郵便番号<input data-key="postalCode" placeholder="100-0001"></label>
          <label>都道府県<input data-key="prefecture" placeholder="東京都"></label>
        </div>
        <label>市区郡番地<input data-key="address1" placeholder="千代田区千代田1-1"></label>
        <label>建物名<input data-key="address2" placeholder="○○マンション101"></label>
        <label class="check"><input data-key="holidaySame" type="checkbox">休暇中住所は現住所と同じ</label>
      </section>

      <section class="panel">
        <h2>学校</h2>
        <div class="grid two">
          <label>卒業年<input data-key="gradYear" inputmode="numeric" placeholder="2027"></label>
          <label>卒業月<input data-key="gradMonth" inputmode="numeric" placeholder="03"></label>
        </div>
        <label>卒業区分
          <select data-key="gradStatus">
            <option value="">未選択</option>
            <option value="卒業（修了）見込み">卒業（修了）見込み</option>
            <option value="卒業予定">卒業予定</option>
            <option value="卒業（修了）">卒業（修了）</option>
            <option value="既卒">既卒</option>
          </select>
        </label>
        <label>学校名<input data-key="schoolName"></label>
        <div class="grid two">
          <label>学部<input data-key="faculty"></label>
          <label>学科・専攻<input data-key="department"></label>
        </div>
        <div class="grid two">
          <label>学校区分
            <select data-key="schoolType">
              <option value="">未選択</option>
              <option value="大学">大学</option>
              <option value="大学院">大学院</option>
              <option value="短期大学">短期大学</option>
              <option value="高等専門学校">高等専門学校</option>
              <option value="専門学校">専門学校</option>
              <option value="高等学校">高等学校</option>
            </select>
          </label>
          <label>文理区分
            <select data-key="humanitiesScience">
              <option value="">未選択</option>
              <option value="文系">文系</option>
              <option value="理系">理系</option>
            </select>
          </label>
        </div>
        <div class="grid two">
          <label>入学年<input data-key="schoolStartYear" placeholder="2023"></label>
          <label>入学月<input data-key="schoolStartMonth" placeholder="04"></label>
        </div>
        <div class="grid two">
          <label>卒業予定年<input data-key="schoolEndYear" placeholder="空欄なら卒業年"></label>
          <label>卒業予定月<input data-key="schoolEndMonth" placeholder="空欄なら卒業月"></label>
        </div>
        <div class="grid two">
          <label>学位<input data-key="degree" placeholder="学士"></label>
          <label>学位取得年<input data-key="degreeYear" placeholder="2027"></label>
        </div>
        <label>学位取得月<input data-key="degreeMonth" placeholder="03"></label>
        <div class="grid two">
          <label>高校名<input data-key="highSchoolName" placeholder="○○高等学校"></label>
          <label>高校よみがな<input data-key="highSchoolKana" placeholder="○○こうとうがっこう"></label>
        </div>
        <div class="grid two">
          <label>高校所在地<input data-key="highSchoolPrefecture" placeholder="東京都"></label>
          <label>高校区分
            <select data-key="highSchoolType">
              <option value="">未選択</option>
              <option value="高校">高校</option>
              <option value="高専（本科）">高専（本科）</option>
              <option value="高専（専攻科）">高専（専攻科）</option>
              <option value="短大">短大</option>
              <option value="専門学校">専門学校</option>
            </select>
          </label>
        </div>
        <div class="grid two">
          <label>高校入学年<input data-key="highSchoolStartYear" placeholder="空欄なら高校卒業年の3年前"></label>
          <label>高校入学月<input data-key="highSchoolStartMonth" placeholder="04"></label>
        </div>
        <div class="grid two">
          <label>高校卒業年<input data-key="highSchoolGradYear" placeholder="2023"></label>
          <label>高校卒業月<input data-key="highSchoolGradMonth" placeholder="03"></label>
        </div>
        <label>ゼミ・研究室<input data-key="seminar"></label>
        <label>研究テーマ<input data-key="researchTheme"></label>
      </section>

      <section class="panel">
        <h2>経験・希望</h2>
        <label>クラブ・サークル<input data-key="club"></label>
        <label>資格・免許<textarea data-key="qualification" rows="3"></textarea></label>
        <div class="grid two">
          <label>運転免許<input data-key="driverLicense" placeholder="有"></label>
          <label>TOEIC等<input data-key="toeic" placeholder="720"></label>
        </div>
        <div class="grid two">
          <label>希望職種<input data-key="desiredJob"></label>
          <label>希望勤務地<input data-key="desiredLocation"></label>
        </div>
        <label>参加希望イベント<textarea data-key="interestedEvents" rows="3" placeholder="2days夏インターンシップ、東京セミナーなど"></textarea></label>
        <label>イベント希望日程<input data-key="eventDate" placeholder="未定／別日程を希望、2026/6/10 など"></label>
        <label>会社を知ったきっかけ<input data-key="howKnowCompany" placeholder="マイナビ、合同説明会など"></label>
      </section>

      <section class="panel">
        <h2>確認・該当事項</h2>
        <label class="check"><input data-key="termsConsent" type="checkbox">規約・利用条件に同意する</label>
        <label class="check"><input data-key="privacyConsent" type="checkbox">個人情報の取り扱いに同意する</label>
        <div class="grid two">
          <label>国籍<input data-key="nationality" placeholder="日本"></label>
          <label>在留資格<input data-key="residenceStatus" placeholder="日本国籍、永住者など"></label>
        </div>
        <label>就労資格<input data-key="workAuthorization" placeholder="就労可能"></label>
        <label class="check"><input data-key="foreignAddress" type="checkbox">日本国外の住所を使う</label>
        <label>留学経験<input data-key="studyAbroad" placeholder="なし"></label>
        <label>障がい・配慮事項<input data-key="disabilityStatus" placeholder="なし"></label>
        <label>職歴<textarea data-key="employmentHistory" rows="3" placeholder="なし"></textarea></label>
        <div class="grid two">
          <label>勤務経験ブランド<input data-key="employmentBrand" placeholder="ユニクロ、ジーユーなど"></label>
          <label>勤務店舗<input data-key="employmentStore" placeholder="東京ミッドタウン店など"></label>
        </div>
        <div class="grid two">
          <label>社員番号<input data-key="employeeNumber" placeholder="8桁など"></label>
          <label>勤務期間<input data-key="employmentDuration" placeholder="6カ月以上"></label>
        </div>
        <div class="grid two">
          <label>勤務開始年<input data-key="employmentStartYear" placeholder="2025"></label>
          <label>勤務開始月<input data-key="employmentStartMonth" placeholder="04"></label>
        </div>
        <label>転勤の確認回答<input data-key="relocationConsent" placeholder="はい、理解しています など"></label>
        <label>紹介者・その他詳細<input data-key="referralDetail" placeholder="紹介者名、その他を選んだ理由など"></label>
        <label>該当なし用の回答<input data-key="noAnswer" placeholder="なし"></label>
      </section>

      <section class="panel">
        <h2>その他</h2>
        <label>ログインID<input data-key="loginId" placeholder="空欄ならメールアドレスを使います"></label>
        <label>認証コード<input data-key="verificationCode" placeholder="メールで届いた6桁など"></label>
        <label>登録用パスワード<input data-key="password" type="password"></label>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
